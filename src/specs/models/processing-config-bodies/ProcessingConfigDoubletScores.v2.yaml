title: Doublet Scores
type: object
description: Processing config body for Doublet Scores filter. Keys are sample UUIDs or 'one' for Seurat uploads, values are per-sample configurations.
additionalProperties:
  type: object
  properties:
    enabled:
      type: boolean
    auto:
      type: boolean
    filterSettings:
      type: object
      properties:
        probabilityThreshold:
          type: number
        binStep:
          type: number
    defaultFilterSettings:
      type: object
      properties:
        probabilityThreshold:
          type: number
        binStep:
          type: number
    sampleTechnology:
      type: string
      description: Technology of the sample (gem2s only)
    recomputeDoubletScore:
      type: boolean
      description: Whether to recompute doublet score (gem2s only)
  required:
    - filterSettings
